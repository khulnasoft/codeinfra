env:
  GITHUB_TOKEN: ${{ secrets.CODEINFRA_BOT_TOKEN }}
  VERSION: ${{ github.event.client_payload.ref }}
  COMMIT_SHA: ${{ github.event.client_payload.commitSha }}

on:
  repository_dispatch:
    types:
      - docs

jobs:
  docs:
    name: Build Package Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout Scripts Repo
        uses: actions/checkout@v4
        with:
          path: ci-scripts
          repository: codeinfra/scripts
      - name: Trigger Docs Build
        run: |
          ./ci-scripts/ci/build-package-docs.sh "codeinfra"
        env:
          TRAVIS: true
          CODEINFRA_BOT_GITHUB_API_TOKEN: ${{ secrets.CODEINFRA_BOT_TOKEN }}
          TRAVIS_TAG: ${{ env.VERSION }}
