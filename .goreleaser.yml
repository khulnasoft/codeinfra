dist: goreleaser
version: 2

project_name: codeinfra

builds:
- &codeinfrabin
  id: codeinfra
  binary: codeinfra
  dir: pkg
  main: ./cmd/codeinfra
  gobinary: ../scripts/go-wrapper.sh
  env:
  - GO111MODULE=on
  goos: ['linux', 'darwin', 'windows']
  goarch: ['amd64', 'arm64']
  goamd64: ['v1']
  flags:
    - -trimpath
  ldflags:
    - -w -s -X github.com/khulnasoft/codeinfra/sdk/v3/go/common/version.Version=v{{.Env.CODEINFRA_VERSION}}
  mod_timestamp: '{{ .CommitTimestamp }}'
  tags:
    # Enforce the pure Go implementation of os/user, even when cgo is available.
    # See https://pkg.go.dev/os/user#pkg-overview.
    - osusergo
- <<: *codeinfrabin
  id: codeinfra-language-go
  binary: codeinfra-language-go
  dir: sdk/go/codeinfra-language-go
  main: ./
  gobinary: ../../../scripts/go-wrapper.sh
- <<: *codeinfrabin
  id: codeinfra-language-nodejs
  binary: codeinfra-language-nodejs
  dir: sdk/nodejs/cmd/codeinfra-language-nodejs
  main: ./
  gobinary: ../../../../scripts/go-wrapper.sh
- <<: *codeinfrabin
  id: codeinfra-language-python
  binary: codeinfra-language-python
  dir: sdk/python/cmd/codeinfra-language-python
  main: ./
  gobinary: ../../../../scripts/go-wrapper.sh
- <<: *codeinfrabin
  id: codeinfra-display-wasm
  binary: codeinfra-display
  dir: pkg
  main: ./backend/display/wasm
  goos: ['js']
  goarch: ['wasm']
  hooks:
    post:
      # Check the size of the WASM module.
      - |
        sh -c "[ `du -k {{ .Path }} | cut -f1` -le 79182 ] || (echo 'error: WASM module > 77M'; exit 1)"

archives:
- id: codeinfra
  wrap_in_directory: codeinfra{{ if eq .Os "windows" }}/bin{{ end }}
  format_overrides:
    - goos: windows
      format: zip
  files:
      # OS specific scripts, not compiled
    - src: bin/{{ .Os }}/*
      dst: '.'
      strip_parent: true
      # binaries
    - src: 'bin/{{ .Os }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}/*'
      dst: '.'
      strip_parent: true
  name_template: '{{ .ProjectName }}-{{ .Tag }}-{{ .Os }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}'

snapshot:
  name_template: "{{ .Version }}-SNAPSHOT"

checksum:
  name_template: "{{ .ProjectName }}-{{ .Version }}-checksums.txt"
